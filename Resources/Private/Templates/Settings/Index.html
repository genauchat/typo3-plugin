<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<div class="gc-wrap">

    <f:if condition="{saved}">
        <div class="gc-alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
            <f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:saved" />
        </div>
    </f:if>

    <div class="gc-header">
        <div class="gc-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </div>
        <div>
            <h1>genau.chat</h1>
            <p><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:subtitle" /></p>
        </div>
        <f:if condition="{isActive}">
            <f:then>
                <div class="gc-badge gc-badge--active">
                    <span class="gc-dot gc-dot--active"></span>
                    <f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:badge.active" />
                </div>
            </f:then>
            <f:else>
                <div class="gc-badge gc-badge--inactive">
                    <span class="gc-dot gc-dot--inactive"></span>
                    <f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:badge.inactive" />
                </div>
            </f:else>
        </f:if>
    </div>

    <div class="gc-card">
        <f:form action="save" method="post">
            <label class="gc-toggle">
                <input type="checkbox" name="enabled" value="1"
                       <f:if condition="{enabled}">checked="checked"</f:if> />
                <span class="gc-switch"></span>
                <div>
                    <div class="gc-toggle-label"><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:toggle.label" /></div>
                    <div class="gc-toggle-desc"><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:toggle.description" /></div>
                </div>
            </label>
            <div class="gc-card-body">
                <label class="gc-label" for="gc-script"><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:widgetCode.label" /></label>
                <textarea
                    id="gc-script"
                    name="script"
                    class="gc-textarea"
                    rows="4"
                    placeholder='&lt;script src="https://genau.chat/widget.js" data-widget-id="YOUR_ID"&gt;&lt;/script&gt;'
                ><f:format.raw>{script}</f:format.raw></textarea>
                <p class="gc-hint">
                    <f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:widgetCode.help" />
                    <a href="https://genau.chat" target="_blank" rel="noopener noreferrer">genau.chat</a>.
                </p>
            </div>
            <div class="gc-footer">
                <button type="submit" class="gc-btn"><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:save" /></button>
            </div>
        </f:form>
    </div>

    <div class="gc-steps">
        <div class="gc-step">
            <div class="gc-step-num">1</div>
            <p><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:step1" /> <a href="https://genau.chat" target="_blank" rel="noopener">genau.chat</a></p>
        </div>
        <div class="gc-step">
            <div class="gc-step-num">2</div>
            <p><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:step2" /></p>
        </div>
        <div class="gc-step">
            <div class="gc-step-num">3</div>
            <p><f:format.raw><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:step3" /></f:format.raw></p>
        </div>
        <div class="gc-step">
            <div class="gc-step-num">4</div>
            <p><f:translate key="LLL:EXT:genauchat/Resources/Private/Language/locallang_mod.xlf:step4" /></p>
        </div>
    </div>

</div>

</html>
